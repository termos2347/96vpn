version: '3.8'

services:
  db:
    image: postgres:16
    container_name: neuroprompt_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: neuroprompt
      POSTGRES_USER: neuroprompt_user
      POSTGRES_PASSWORD: ${DB_PASSWORD?err}   # обязательно задать в .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuroprompt_user -d neuroprompt"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: neuroprompt_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs   # опционально, для сохранения логов на хост
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: