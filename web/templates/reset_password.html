{% extends "base.html" %}
{% block title %}Новый пароль - {{ site_name }}{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center px-6">
    <div class="glass-effect p-8 rounded-lg w-full max-w-md neon-glow">
        <h1 class="text-3xl font-bold mb-4 gradient-text text-center">Новый пароль</h1>
        <form id="resetForm" class="space-y-4">
            <input type="hidden" id="token" value="{{ token }}">
            
            <div class="relative">
                <label class="block text-sm font-bold mb-2">Новый пароль</label>
                <input type="password" id="password" required minlength="8" class="w-full bg-black bg-opacity-40 border border-purple-500 border-opacity-30 rounded px-4 py-2 pr-10 text-white focus:outline-none focus:border-purple-500" placeholder="••••••••">
                <button type="button" class="toggle-password absolute right-3 top-9 text-gray-400 hover:text-purple-400 focus:outline-none" data-target="password">
                    <i class="fas fa-eye-slash"></i>
                </button>
            </div>
            
            <div class="relative">
                <label class="block text-sm font-bold mb-2">Подтверждение пароля</label>
                <input type="password" id="password_confirm" required class="w-full bg-black bg-opacity-40 border border-purple-500 border-opacity-30 rounded px-4 py-2 pr-10 text-white focus:outline-none focus:border-purple-500" placeholder="••••••••">
                <button type="button" class="toggle-password absolute right-3 top-9 text-gray-400 hover:text-purple-400 focus:outline-none" data-target="password_confirm">
                    <i class="fas fa-eye-slash"></i>
                </button>
            </div>
            
            <button type="submit" class="button-primary text-white w-full py-2 rounded-lg font-bold">Сохранить</button>
            <div id="message" class="text-center text-sm mt-4"></div>
        </form>
    </div>
</main>

<script>
// Переключение видимости паролей
document.querySelectorAll('.toggle-password').forEach(button => {
    button.addEventListener('click', function() {
        const targetId = this.getAttribute('data-target');
        const input = document.getElementById(targetId);
        const icon = this.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        }
    });
});

// Отправка формы
document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const token = document.getElementById('token').value;
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('password_confirm').value;
    const msg = document.getElementById('message');
    
    // Валидация
    if (password !== passwordConfirm) {
        msg.innerHTML = '<span class="text-red-400">Пароли не совпадают</span>';
        return;
    }
    if (password.length < 8) {
        msg.innerHTML = '<span class="text-red-400">Пароль должен содержать минимум 8 символов</span>';
        return;
    }
    if (!/^[a-zA-Z0-9]+$/.test(password)) {
        msg.innerHTML = '<span class="text-red-400">Пароль может содержать только английские буквы и цифры</span>';
        return;
    }
    
    try {
        const resp = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token, new_password: password})
        });
        const data = await resp.json();
        if (resp.ok) {
            msg.innerHTML = '<span class="text-green-400">Пароль изменён! Теперь можно <a href="/login" class="text-purple-400">войти</a>.</span>';
        } else {
            msg.innerHTML = '<span class="text-red-400">' + (data.detail || 'Ошибка') + '</span>';
        }
    } catch (err) {
        msg.innerHTML = '<span class="text-red-400">Ошибка соединения</span>';
    }
});
</script>
{% endblock %}
