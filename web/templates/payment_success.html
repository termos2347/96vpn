{% extends "base.html" %}

{% block title %}Оплата прошла успешно - {{ site_name }}{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="glass-effect p-6 sm:p-8 rounded-lg w-full max-w-md neon-glow text-center">
        <div class="text-green-400 text-6xl mb-4"><i class="fas fa-check-circle"></i></div>
        <h1 class="text-3xl font-bold gradient-text mb-4">Спасибо за оплату!</h1>
        <p class="text-gray-400 mb-6">Ваша подписка активирована. Теперь вам доступны все промпты.</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/dashboard" class="button-primary text-white px-6 py-2 rounded-lg inline-block">Перейти в кабинет</a>
            <a href="/prompts" class="glass-effect text-white px-6 py-2 rounded-lg inline-block hover:bg-white hover:bg-opacity-10 transition">Смотреть промпты</a>
        </div>
    </div>
</main>
{% endblock %}
