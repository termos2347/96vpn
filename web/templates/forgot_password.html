{% extends "base.html" %}
{% block title %}Восстановление пароля - {{ site_name }}{% endblock %}
{% block content %}
<main class="min-h-screen flex items-center justify-center px-6">
    <div class="glass-effect p-8 rounded-lg w-full max-w-md neon-glow">
        <h1 class="text-3xl font-bold mb-4 gradient-text text-center">Восстановление пароля</h1>
        <p class="text-gray-400 text-center mb-8">Укажите email, и мы отправим вам инструкции.</p>
        <form id="forgotForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-2">Email</label>
                <input type="email" name="email" required class="w-full bg-black bg-opacity-40 border border-purple-500 border-opacity-30 rounded px-4 py-2 text-white focus:outline-none focus:border-purple-500" placeholder="your@email.com">
            </div>
            <button type="submit" class="button-primary text-white w-full py-2 rounded-lg font-bold">Отправить инструкции</button>
            <div id="message" class="text-center text-sm mt-4"></div>
        </form>
        <p class="text-center text-gray-400 mt-6">
            <a href="/login" class="text-purple-400 hover:text-purple-300">← Вернуться ко входу</a>
        </p>
    </div>
</main>

<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.querySelector('input[name="email"]').value;
    const msg = document.getElementById('message');
    try {
        const resp = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email})
        });
        const data = await resp.json();
        msg.innerHTML = '<span class="text-green-400">' + data.message + '</span>';
    } catch (err) {
        msg.innerHTML = '<span class="text-red-400">Ошибка соединения</span>';
    }
});
</script>
{% endblock %}
