{% extends "base.html" %}

{% block title %}{{ site_name }} - Вход{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center px-6">
    <div class="glass-effect p-8 rounded-lg w-full max-w-md neon-glow">
        <h1 class="text-3xl font-bold mb-2 text-center gradient-text">Вход</h1>
        <p class="text-center text-gray-400 mb-8">Введите ваши учётные данные</p>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-2">Email</label>
                <input type="email" name="email" required class="w-full bg-black bg-opacity-40 border border-purple-500 border-opacity-30 rounded px-4 py-2 text-white focus:outline-none focus:border-purple-500" placeholder="your@email.com">
            </div>
            
            <div>
                <label class="block text-sm font-bold mb-2">Пароль</label>
                <input type="password" name="password" required class="w-full bg-black bg-opacity-40 border border-purple-500 border-opacity-30 rounded px-4 py-2 text-white focus:outline-none focus:border-purple-500" placeholder="••••••••">
            </div>
            
            <button type="submit" class="button-primary text-white w-full py-2 rounded-lg font-bold">
                Войти
            </button>
            
            <div id="message" class="text-center text-sm mt-4"></div>
        </form>
        
        <p class="text-center text-gray-400 mt-6">
            Нет аккаунта? <a href="/register" class="text-purple-400 hover:text-purple-300">Зарегистрироваться</a>
        </p>
    </div>
</main>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.querySelector('input[name="email"]').value;
    const password = document.querySelector('input[name="password"]').value;
    
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });
        
        const data = await response.json();
        
        if (response.ok) {
            // Сохраняем JWT токен в куку
            document.cookie = `access_token=${data.access_token}; path=/; max-age=2592000`; // 30 дней
            window.location.href = '/dashboard';
        } else {
            document.getElementById('message').innerHTML = '<span class="text-red-400">Неверные учётные данные</span>';
        }
    } catch (error) {
        document.getElementById('message').innerHTML = '<span class="text-red-400">Ошибка при входе</span>';
    }
});
</script>
{% endblock %}
