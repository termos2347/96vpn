{% extends "base.html" %}

{% block title %}{{ site_name }} - Вход{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="glass-effect p-6 sm:p-8 rounded-lg w-full max-w-md neon-glow">
        <h1 class="text-3xl font-bold mb-2 text-center gradient-text">Вход</h1>
        <p class="text-center text-gray-400 mb-8">Введите ваши учётные данные</p>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-2 text-white">Email</label>
                <input type="email" name="email" required class="w-full bg-black bg-opacity-60 border border-green-500 border-opacity-30 rounded px-4 py-3 text-white focus:outline-none focus:border-green-500 text-base" placeholder="your@email.com">
            </div>
            
            <div class="relative">
                <label class="block text-sm font-bold mb-2 text-white">Пароль</label>
                <input type="password" name="password" id="password" required class="w-full bg-black bg-opacity-60 border border-green-500 border-opacity-30 rounded px-4 py-3 pr-10 text-white focus:outline-none focus:border-green-500 text-base" placeholder="••••••••">
                <button type="button" class="toggle-password absolute right-3 top-10 text-gray-400 hover:text-green-400 focus:outline-none" data-target="password">
                    <i class="fas fa-eye-slash"></i>
                </button>
            </div>
            
            <button type="submit" class="button-primary text-white w-full py-3 rounded-lg font-bold text-lg">Войти</button>
            <div id="message" class="text-center text-sm mt-4"></div>
        </form>
        
        <p class="text-center text-gray-400 mt-6">
            <a href="/forgot-password" class="text-green-400 hover:text-green-300">Забыли пароль?</a>
        </p>
        <p class="text-center text-gray-400 mt-4">
            Нет аккаунта? <a href="/register" class="text-green-400 hover:text-green-300">Зарегистрироваться</a>
        </p>
    </div>
</main>

<script>
document.querySelectorAll('.toggle-password').forEach(button => {
    button.addEventListener('click', function() {
        const targetId = this.getAttribute('data-target');
        const input = document.getElementById(targetId);
        const icon = this.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        }
    });
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.querySelector('input[name="email"]').value;
    const password = document.querySelector('input[name="password"]').value;
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });
        const data = await response.json();
        if (response.ok) {
            window.location.href = '/dashboard';
        } else {
            document.getElementById('message').innerHTML = '<span class="text-red-400">Неверные учётные данные</span>';
        }
    } catch (error) {
        document.getElementById('message').innerHTML = '<span class="text-red-400">Ошибка при входе</span>';
    }
});
</script>
{% endblock %}
